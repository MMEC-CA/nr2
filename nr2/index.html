<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REX DOWN!</title>
    <style>
        :root { --gold: #FFD700; --bg-gradient: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-window { position: relative; border: 4px solid var(--gold); background: var(--bg-gradient); width: 600px; height: 380px; max-width: 95vw; overflow: hidden; box-shadow: 0 0 50px rgba(255, 215, 0, 0.2); }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; font-size: 1.2rem; text-shadow: 2px 2px #000; pointer-events: none; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; z-index: 10; }
        .win-screen { background: linear-gradient(45deg, red, orange, yellow, green, blue, purple) !important; animation: rainbow 2s infinite linear; }
        @keyframes rainbow { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        button { background: var(--gold); border: none; padding: 10px 25px; font-size: 1.1rem; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 15px; border-bottom: 4px solid #b8860b; }
        button:active { transform: translateY(2px); border-bottom: none; }
        .credits { margin-top: 10px; font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

    <h1 style="color: var(--gold); margin-bottom: 8px;">REX DOWN!</h1>
   
    <div id="game-window">
        <div id="ui">
            <div id="lvlDisplay">LVL 1</div>
            <div id="progDisplay">0%</div>
        </div>
        <canvas id="canvas" width="600" height="380"></canvas>
        <div id="overlay">
            <h2 id="title">REX DOWN!</h2>
            <p id="msg">Space to Start / Jump / Fly</p>
            <button id="startBtn">START GAME</button>
            <div class="credits">By: Sofia, Nyssa, Tang xin and Nour</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

// Game Settings
let active = false;
let level = 1;
let progress = 0;
let baseSpeed = 4.5;
let currentSpeed = 4.5;
let frame = 0;
let obstacles = [];
const colors = ['#00FF00', '#800080', '#0000FF', '#FF0000', '#FFA500', '#FFFF00', '#FFD700'];

const rex = {
    x: 90, y: 300, w: 38, h: 38,
    vy: 0, gravity: 0.7, jumpPower: -11,
    jumps: 0, maxJumps: 3,
    mode: 'REX', // REX or MACHINE
    rot: 0,
    isInput: false
};

// --- AUDIO (Celebratory Synth) ---
const audio = new (window.AudioContext || window.webkitAudioContext)();
function playTone(f, t, d) {
    const o = audio.createOscillator();
    const g = audio.createGain();
    o.type = 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(0.1, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + d);
    o.connect(g); g.connect(audio.destination);
    o.start(t); o.stop(t + d);
}

function musicLoop() {
    if (!active) return;
    const now = audio.currentTime;
    const melody = [261, 329, 392, 523, 440, 523];
    melody.forEach((note, i) => playTone(note, now + i * 0.2, 0.2));
    setTimeout(musicLoop, 1200);
}

// --- INPUTS ---
const jumpAction = (press) => {
    rex.isInput = press;
    if (press && active) {
        if (rex.mode === 'REX' && rex.jumps < rex.maxJumps) {
            rex.vy = rex.jumpPower;
            rex.jumps++;
            playTone(300 + (rex.jumps * 100), audio.currentTime, 0.1);
        }
    }
};

window.addEventListener('keydown', e => { if(["Space", "ArrowUp", "KeyW"].includes(e.code)) jumpAction(true); });
window.addEventListener('keyup', e => { if(["Space", "ArrowUp", "KeyW"].includes(e.code)) jumpAction(false); });
startBtn.addEventListener('click', () => { if(audio.state === 'suspended') audio.resume(); resetGame(); });

function resetGame() {
    active = true;
    progress = 0;
    obstacles = [];
    rex.y = 280; rex.vy = 0; rex.mode = 'REX';
    overlay.style.display = 'none';
    overlay.classList.remove('win-screen');
    // Speed management: Higher levels start faster, but we cap it.
    currentSpeed = Math.min(baseSpeed + (level * 0.4), 8);
    musicLoop();
}

function triggerEnd(win) {
    active = false;
    overlay.style.display = 'flex';
    if (win) {
        level++;
        overlay.classList.add('win-screen');
        document.getElementById('title').innerText = "100% COMPLETE!";
        document.getElementById('msg').innerText = "Next Portal Open...";
        startBtn.innerText = "ENTER NEXT LEVEL";
    } else {
        document.getElementById('title').innerText = "REX DOWN!";
        document.getElementById('msg').innerText = `Progress: ${Math.floor(progress)}%`;
        startBtn.innerText = "RETRY";
        // Slow down slightly on fail to help the player
        currentSpeed = Math.max(baseSpeed, currentSpeed - 0.5);
    }
}

function spawn() {
    frame++;
    let rate = Math.max(35, 80 - (level * 5));
    if (frame % rate === 0) {
        let r = Math.random();
        if (r < 0.35) {
            obstacles.push({ x: 650, y: 320, w: 30, h: 30, type: 'spike' });
        } else if (r < 0.75) {
            let h = 50 + Math.random() * (60 + level * 10);
            obstacles.push({ x: 650, y: 350 - h, w: 45, h: h, type: 'pillar' });
        } else {
            obstacles.push({ x: 650, y: 150, w: 40, h: 80, type: 'portal' });
        }
    }
    if (progress >= 100 && !obstacles.some(o => o.type === 'exit')) {
        obstacles.push({ x: 650, y: 50, w: 70, h: 280, type: 'exit' });
    }
}

function drawPillar(o) {
    // Detailed Pillar with segments
    ctx.fillStyle = "#333";
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.strokeStyle = colors[level % colors.length];
    ctx.lineWidth = 2;
    ctx.strokeRect(o.x, o.y, o.w, o.h);
    // Draw "Mechanical details"
    for(let i = 10; i < o.h; i += 30) {
        ctx.strokeRect(o.x + 5, o.y + i, o.w - 10, 5);
    }
}

function drawMonster(x, y, r, mode) {
    ctx.save();
    ctx.translate(x + 19, y + 19);
    ctx.rotate(r);
    // Body
    ctx.fillStyle = mode === 'REX' ? colors[level % colors.length] : '#FF00FF';
    ctx.fillRect(-19, -19, 38, 38);
    ctx.strokeStyle = 'white';
    ctx.strokeRect(-19, -19, 38, 38);
    // Eyes
    ctx.fillStyle = 'white';
    ctx.fillRect(-12, -12, 10, 10); ctx.fillRect(4, -12, 10, 10);
    ctx.fillStyle = 'black';
    ctx.fillRect(-8, -8, 4, 4); ctx.fillRect(8, -8, 4, 4);
    // Monster Horns
    ctx.fillStyle = 'gold';
    ctx.beginPath();
    ctx.moveTo(-15, -19); ctx.lineTo(-10, -32); ctx.lineTo(-5, -19); ctx.fill();
    ctx.moveTo(15, -19); ctx.lineTo(10, -32); ctx.lineTo(5, -19); ctx.fill();
   
    if (mode === 'MACHINE') {
        ctx.fillStyle = 'rgba(0, 255, 255, 0.5)';
        ctx.beginPath(); ctx.moveTo(-25, 10); ctx.lineTo(-45, 0); ctx.lineTo(-25, -10); ctx.fill();
    }
    ctx.restore();
}

function update() {
    if (!active) return;

    if (rex.mode === 'REX') {
        rex.vy += rex.gravity;
        rex.rot += 0.12;
    } else {
        // Flight Logic
        if (rex.isInput) rex.vy -= 1.0;
        else rex.vy += 0.6;
        rex.vy *= 0.92; // Stabilizing drag
        rex.rot = rex.vy * 0.06;
    }

    rex.y += rex.vy;
    if (rex.y > 312) {
        rex.y = 312; rex.vy = 0; rex.jumps = 0;
        if(rex.mode === 'REX') rex.rot = 0;
    }
    if (rex.y < 0) { rex.y = 0; rex.vy = 0.5; }

    progress += 0.06;
    document.getElementById('progDisplay').innerText = Math.min(100, Math.floor(progress)) + "%";
    document.getElementById('lvlDisplay').innerText = "LVL " + level;

    spawn();

    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i];
        o.x -= currentSpeed;

        // Collision
        if (rex.x < o.x + o.w && rex.x + rex.w > o.x && rex.y < o.y + o.h && rex.y + rex.h > o.y) {
            if (o.type === 'portal') {
                rex.mode = rex.mode === 'REX' ? 'MACHINE' : 'REX';
                obstacles.splice(i, 1);
                playTone(600, audio.currentTime, 0.2);
            } else if (o.type === 'exit') {
                triggerEnd(true);
            } else {
                triggerEnd(false);
            }
        }
        if (o.x < -100) obstacles.splice(i, 1);
    }
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
   
    // Floor
    ctx.fillStyle = "#444";
    ctx.fillRect(0, 350, canvas.width, 30);
    ctx.strokeStyle = "gold";
    ctx.strokeRect(0, 350, canvas.width, 2);

    obstacles.forEach(o => {
        if (o.type === 'spike') {
            ctx.fillStyle = "#FF3300";
            ctx.beginPath();
            ctx.moveTo(o.x, o.y + 30); ctx.lineTo(o.x + 15, o.y); ctx.lineTo(o.x + 30, o.y + 30);
            ctx.fill();
        } else if (o.type === 'pillar') {
            drawPillar(o);
        } else if (o.type === 'portal') {
            ctx.fillStyle = "#00f2ff";
            ctx.shadowBlur = 15; ctx.shadowColor = "#00f2ff";
            ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.shadowBlur = 0;
        } else if (o.type === 'exit') {
            ctx.fillStyle = "gold";
            ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.shadowBlur = 20; ctx.shadowColor = "white";
        }
    });

    drawMonster(rex.x, rex.y, rex.rot, rex.mode);
    update();
    requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
